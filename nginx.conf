worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 25M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/x-javascript text/xml application/xml application/rss+xml;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;

    # INF-1: map SSE paths to their upstream so a single location block handles both
    map \$uri \$sse_upstream {
        ~^/api/forum/.+/events\$   http://forum_upstream;
        ~^/api/notifications/stream http://notifications_upstream;
        default                   "";
    }

    upstream identity_upstream {
        server identity:8080;
        keepalive 32;
    }

    upstream forum_upstream {
        server forum:8080;
        keepalive 4;
    }

    upstream finance_upstream {
        server finance:8080;
        keepalive 32;
    }

    upstream notifications_upstream {
        server notifications:8080;
        keepalive 4;
    }

    upstream frontend_upstream {
        server \${FRONTEND_UPSTREAM};
        keepalive 16;
    }

    server {
        listen 80;
        server_name localhost;

        location /uploads/avatars/ {
            alias /var/www/avatars/;
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Disposition "inline";
            try_files \$uri =404;
        }

        location /uploads/forum/ {
            alias /var/www/forum/;
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Disposition "inline";
            try_files \$uri =404;
        }

        location /api/identity/ {
            proxy_pass http://identity_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }

        # INF-1: unified SSE location for forum events + notifications stream
        # INF-2: 90s timeouts — EventSource reconnects automatically on expiry
        location ~ ^/api/(forum/.+/events|notifications/stream)\$ {
            proxy_pass \$sse_upstream;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 90s;
            proxy_send_timeout 90s;
        }

        location /api/forum/ {
            proxy_pass http://forum_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }

        location /api/finance/ {
            proxy_pass http://finance_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }

        location /api/notifications/ {
            proxy_pass http://notifications_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }

        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade \$http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass \$http_upgrade;
        }
    }
}
