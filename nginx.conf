worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 25M;

    upstream identity_upstream {
        server identity:8080;
        keepalive 32;
    }

    upstream forum_upstream {
        server forum:8080;
        keepalive 32;
    }

    upstream finance_upstream {
        server finance:8080;
        keepalive 32;
    }

    upstream notifications_upstream {
        server notifications:8080;
        keepalive 32;
    }

    upstream frontend_upstream {
        server ${FRONTEND_UPSTREAM};
        keepalive 16;
    }

    server {
        listen 80;
        server_name localhost;

        # User avatars — served directly from the volume written by Identity
        location /uploads/avatars/ {
            alias /var/www/avatars/;
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Disposition "inline";
            try_files $uri =404;
        }

        # Forum media (community images, etc.) — served from the forum upload volume
        location /uploads/forum/ {
            alias /var/www/forum/;
            add_header Cache-Control "public, max-age=3600";
            add_header Content-Disposition "inline";
            try_files $uri =404;
        }

        # Identity API
        location /api/identity/ {
            proxy_pass http://identity_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Forum API — SSE routes (must come before general forum route)
        location ~ ^/api/forum/.+/events$ {
            proxy_pass http://forum_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Forum API
        location /api/forum/ {
            proxy_pass http://forum_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Bills API
        location /api/finance/ {
            proxy_pass http://finance_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Notifications API — SSE stream
        location /api/notifications/stream {
            proxy_pass http://notifications_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Notifications API
        location /api/notifications/ {
            proxy_pass http://notifications_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend — Next.js SSR with proper headers
        location / {
            proxy_pass http://frontend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_cache_bypass $http_upgrade;
        }
    }
}
