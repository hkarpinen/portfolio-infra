services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  identity:
    image: ${IDENTITY_IMAGE:-ghcr.io/hankkarpinen/portfolio-identity:latest}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - avatar_data:/data/avatars
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Identity: ${IDENTITY_CONN:-Host=postgres;Database=identity_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}
      Email__Host: mailpit
      Email__Port: "1025"
      Storage__LocalPath: /data/avatars
      Storage__PublicBaseUrl: /uploads/avatars

  forum:
    image: ${FORUM_IMAGE:-ghcr.io/hankkarpinen/portfolio-forum:latest}
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Forum: ${FORUM_CONN:-Host=postgres;Database=forum_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}

  bills:
    image: ${BILLS_IMAGE:-ghcr.io/hankkarpinen/portfolio-bills:latest}
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Bills: ${BILLS_CONN:-Host=postgres;Database=bills_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/hankkarpinen/portfolio-frontend:latest}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
      INTERNAL_API_URL: http://nginx
    depends_on:
      - identity
      - forum
      - bills

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - identity
      - forum
      - bills
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - avatar_data:/var/www/avatars:ro

volumes:
  pgdata:
  avatar_data:
