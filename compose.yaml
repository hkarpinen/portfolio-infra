services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  identity:
    image: ${IDENTITY_IMAGE:-ghcr.io/hkarpinen/portfolio-identity:latest}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    volumes:
      - avatar_data:/data/avatars
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Identity: ${IDENTITY_CONN:-Host=postgres;Database=identity_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}
      Email__Host: mailpit
      Email__Port: "1025"
      Storage__LocalPath: /data/avatars
      Storage__PublicBaseUrl: ${STORAGE_PUBLIC_BASE_URL:-http://localhost/uploads/avatars}

  forum:
    image: ${FORUM_IMAGE:-ghcr.io/hkarpinen/portfolio-forum:latest}
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_healthy
    volumes:
      - forum_media:/data/forum
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Forum: ${FORUM_CONN:-Host=postgres;Database=forum_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}
      Media__RootPath: /data/forum
      Media__PublicBaseUrl: ${MEDIA_PUBLIC_BASE_URL:-http://localhost/uploads/forum}

  finance:
    image: ${FINANCE_IMAGE:-ghcr.io/hkarpinen/portfolio-finance:latest}
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Finance: ${FINANCE_CONN:-Host=postgres;Database=finance_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}

  notifications:
    image: ${NOTIFICATIONS_IMAGE:-ghcr.io/hkarpinen/portfolio-notifications:latest}
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Notifications: ${NOTIFICATIONS_CONN:-Host=postgres;Database=notifications_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/hkarpinen/portfolio-frontend:latest}
    environment:
      NEXT_PUBLIC_API_URL: http://localhost
      INTERNAL_API_URL: http://nginx
    depends_on:
      - identity
      - forum
      - finance

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - identity
      - forum
      - finance
      - notifications
      - frontend
    environment:
      FRONTEND_UPSTREAM: frontend:3000
    command: >
      /bin/sh -c
      "envsubst '$$FRONTEND_UPSTREAM' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && exec nginx -g 'daemon off;'"
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - avatar_data:/var/www/avatars:ro
      - forum_media:/var/www/forum:ro

volumes:
  pgdata:
  avatar_data:
  forum_media:
