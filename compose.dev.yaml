# Standalone dev stack — run with:
#   docker compose -f compose.dev.yaml up -d
#
# Runs infrastructure, backends, and nginx.
# The frontend is NOT containerised in dev — run it locally:
#   cd ../frontend && npm run dev
#
# nginx is required for two reasons even in dev:
#   1. Serving /uploads/* from Docker named volumes that the local Next.js
#      process cannot access directly.
#   2. Proxying SSE endpoints (/api/notifications/stream, /api/forum/.+/events)
#      without buffering — the Next.js dev server rewrites buffer the response
#      body, which breaks event streaming.
#
# Regular /api/* traffic uses Next.js rewrites (next.config.mjs) and bypasses
# nginx entirely. SSE and upload traffic hits localhost:80 → nginx directly.
#
# Linux users: add `extra_hosts: [host.docker.internal:host-gateway]` to the
# nginx service below, or pass --add-host=host.docker.internal:host-gateway.

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

  identity:
    image: ${IDENTITY_IMAGE:-ghcr.io/hkarpinen/portfolio-identity:latest}
    build:
      context: ../identity
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    volumes:
      - avatar_data:/data/avatars
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Identity: ${IDENTITY_CONN:-Host=postgres;Database=identity_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}
      Email__Host: mailpit
      Email__Port: "1025"
      Storage__LocalPath: /data/avatars
      Storage__PublicBaseUrl: http://localhost/uploads/avatars

  forum:
    image: ${FORUM_IMAGE:-ghcr.io/hkarpinen/portfolio-forum:latest}
    build:
      context: ../forum
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_healthy
    volumes:
      - forum_media:/data/forum
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Forum: ${FORUM_CONN:-Host=postgres;Database=forum_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}
      Media__RootPath: /data/forum
      Media__PublicBaseUrl: http://localhost/uploads/forum

  finance:
    image: ${FINANCE_IMAGE:-ghcr.io/hkarpinen/portfolio-finance:latest}
    build:
      context: ../finance
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Finance: ${FINANCE_CONN:-Host=postgres;Database=finance_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}
      Plaid__ClientId: ${PLAID_CLIENT_ID:-}
      Plaid__Secret: ${PLAID_SECRET:-}
      Plaid__Environment: ${PLAID_ENVIRONMENT:-sandbox}
      Plaid__WebhookUrl: ${PLAID_WEBHOOK_URL:-}

  notifications:
    image: ${NOTIFICATIONS_IMAGE:-ghcr.io/hkarpinen/portfolio-notifications:latest}
    build:
      context: ../notifications
      dockerfile: Dockerfile
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Notifications: ${NOTIFICATIONS_CONN:-Host=postgres;Database=notifications_db;Username=postgres;Password=postgres}
      Jwt__Secret: ${JWT_SECRET:-changeme-at-least-32-chars-long!}
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_USER:-guest}
      RabbitMq__Password: ${RABBITMQ_PASSWORD:-guest}

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - identity
      - forum
      - finance
      - notifications
    environment:
      FRONTEND_UPSTREAM: host.docker.internal:3000
    command: >
      /bin/sh -c
      "envsubst '$$FRONTEND_UPSTREAM' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
      && exec nginx -g 'daemon off;'"
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - avatar_data:/var/www/avatars:ro
      - forum_media:/var/www/forum:ro
    # INF-3: Linux hosts need host.docker.internal resolved to the gateway.
    # Uncomment the block below on Linux (macOS/Windows Docker Desktop handles this automatically):
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

volumes:
  pgdata:
  avatar_data:
  forum_media:
